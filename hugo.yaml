baseURL: "https://inamdarmihir.github.io/aihive/"
languageCode: en-us
title: AI Hive
theme: PaperMod
paginate: 5

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: AI Hive
  description: "Exploring AI, machine learning, and research — notes from the frontier."
  author: Mihir Inamdar
  DateFormat: "January 2, 2006"

  defaultTheme: auto        # auto follows system; users can toggle
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  displayFullLangName: true
  ShowFullTextinRSS: false

  homeInfoParams:
    Title: "Hi, I'm Mihir 👋"
    Content: >
      I write about AI, machine learning, and research.
      Documenting what I learn — one post at a time.

  socialIcons:
    - name: github
      url: "https://github.com/inamdarmihir"
    - name: email
      url: "mailto:mihirsinamdar@gmail.com"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: "https://github.com/inamdarmihir/aihive/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: archives
      name: Archive
      url: /archives/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai
